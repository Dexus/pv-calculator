name: pv_calculator_app
description: Flutter UI for PV Calculator.
publish_to: none
version: 0.10.0+1

environment:
  sdk: ^3.9.0
  flutter: ">=3.35.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  pv_engine:
    path: ../../packages/pv_engine
  component_catalog:
    path: ../../packages/component_catalog
  provider: ^6.1.2
  shared_preferences: ^2.3.0
  file_selector: ^1.0.3
  http: ^1.2.0
  intl: any
  # Map widget for the Einstrahlung tab. OpenStreetMap tiles, no API key,
  # AGPL-compatible. Tile usage policy requires an identifying User-Agent
  # via `TileLayer.userAgentPackageName`.
  flutter_map: ^7.0.2
  latlong2: ^0.9.1
  # Stacked daily bar chart on the Einstrahlung tab. MIT.
  fl_chart: ^0.69.0
  # Phase 7 — relational persistence for projects/sites/scenarios/runs.
  # `sqlite3` is the pure-Dart binding; `sqlite3_flutter_libs` bundles the
  # native shared library for mobile/desktop. On web `sqlite3.wasm` is
  # shipped as a `web/` asset and loaded via `package:sqlite3` web entry
  # points. Pure SQL (no codegen) keeps the build lightweight.
  sqlite3: ^3.3.0
  sqlite3_flutter_libs: ^0.5.27
  # Used by persistence/connection_web.dart to read document.baseURI when
  # resolving the sqlite3.wasm URL. Transitively pulled in by sqlite3/wasm,
  # but listed explicitly so the analyzer accepts the direct import.
  web: ^1.1.0
  path_provider: ^2.1.4
  path: ^1.9.0
  # Phase 8 — PDF report export (Pro). `pdf` builds the document, `printing`
  # opens the OS share/print sheet. Both Apache-2.0 → AGPL-compatible. The
  # engine stays runtime-dep-free; both packages live in the Flutter app only.
  pdf: ^3.11.0
  printing: ^5.13.0
  # Android/iOS fallback for JSON / CSV / catalog export. `file_selector`
  # cannot show a "save dialog" on mobile (Linux/macOS/Windows/web only);
  # on mobile we route the file through the OS share sheet instead. BSD-3,
  # AGPL-compatible. Imported only by `persistence/share_helper_io.dart` so
  # the web build never resolves it. Engine remains runtime-dep-free.
  share_plus: ^11.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  generate: true
