name: pv_calculator_app
description: Flutter UI for PV Calculator.
publish_to: none
version: 0.1.0+1

environment:
  sdk: ^3.9.0
  flutter: ">=3.35.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  pv_engine:
    path: ../../packages/pv_engine
  provider: ^6.1.2
  shared_preferences: ^2.3.0
  file_selector: ^1.0.3
  http: ^1.2.0
  intl: any
  # Map widget for the Einstrahlung tab. OpenStreetMap tiles, no API key,
  # AGPL-compatible. Tile usage policy requires an identifying User-Agent
  # via `TileLayer.userAgentPackageName`.
  flutter_map: ^7.0.2
  latlong2: ^0.9.1
  # Stacked daily bar chart on the Einstrahlung tab. MIT.
  fl_chart: ^0.69.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  generate: true
