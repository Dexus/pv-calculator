name: CI

on:
  push:
  pull_request:

jobs:
  pv-engine:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dart-lang/setup-dart@v1
      - name: Install dependencies
        working-directory: packages/pv_engine
        run: dart pub get
      - name: Analyze
        working-directory: packages/pv_engine
        run: dart analyze
      - name: Test
        working-directory: packages/pv_engine
        run: dart test

  flutter-app:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - name: Install dependencies
        working-directory: app/flutter_app
        run: flutter pub get
      - name: Analyze
        working-directory: app/flutter_app
        run: flutter analyze
      - name: Test
        working-directory: app/flutter_app
        run: flutter test
