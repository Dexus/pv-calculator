name: Deploy GitHub Pages

# Triggers:
#   - push to main when HTML prototype, Flutter app, engine, or this workflow change
#   - workflow_dispatch (manual trigger from the Actions tab)
#
# Every deploy ships THREE things side by side: the HTML prototype at the
# site root, the production Flutter app under /app/, and a debug build of
# the same app under /app-dev/ (profile mode, mild minification, full
# source maps so browser stack traces decode back to Dart). GitHub Pages
# serves only the most recently uploaded artifact, so a partial deploy
# would wipe the sibling paths; keeping all three bundled guarantees the
# site is always whole.
#
# Third-party actions are pinned to full commit SHAs (with the tag in a
# trailing comment) per GitHub's supply-chain guidance. Update the SHA and
# the comment together when bumping a version.

on:
  push:
    branches: [main]
    paths:
      - 'pv_calculator_pvgis_clientv4pgis.html'
      - 'pv_calculator_dexus_overlay/app/flutter_app/**'
      - 'pv_calculator_dexus_overlay/packages/pv_engine/**'
      - 'pv_calculator_dexus_overlay/packages/component_catalog/**'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Stage HTML prototype at site root
        run: |
          mkdir -p _site
          cp pv_calculator_pvgis_clientv4pgis.html _site/index.html

      - uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2 # v2
        with:
          channel: stable

      - name: Flutter pub get
        working-directory: pv_calculator_dexus_overlay/app/flutter_app
        run: flutter pub get

      - name: Flutter build web (release)
        working-directory: pv_calculator_dexus_overlay/app/flutter_app
        env:
          # Optional: set the PVGIS_PROXY secret in the repository to route
          # PVGIS requests through the Cloudflare caching worker.
          # The build works without it; the app falls back to the public API.
          PVGIS_PROXY: ${{ secrets.PVGIS_PROXY }}
        run: |
          # Web deploys always ship the full Pro feature set (currently:
          # cyclic SOC convergence). Local `flutter run` and CI default
          # to the free build; this workflow is the single place that
          # flips Pro on.
          dart_defines="--dart-define=PRO_FEATURES=true"
          if [ -n "$PVGIS_PROXY" ]; then
            dart_defines="$dart_defines --dart-define=PVGIS_PROXY=$PVGIS_PROXY"
          fi
          flutter build web --release \
            --base-href "/${{ github.event.repository.name }}/app/" \
            $dart_defines

      - name: Stage Flutter app at /app/
        run: |
          mkdir -p _site/app
          cp -r pv_calculator_dexus_overlay/app/flutter_app/build/web/. _site/app/

      - name: Flutter build web (debug, with source maps)
        working-directory: pv_calculator_dexus_overlay/app/flutter_app
        env:
          PVGIS_PROXY: ${{ secrets.PVGIS_PROXY }}
        run: |
          # Same Pro/PVGIS flags as the release build above; the only
          # differences are --profile (keeps debug names + service
          # extensions, asserts stay off as in release), --source-maps
          # (emits main.dart.js.map alongside the JS bundle), and -O 1
          # (mild dart2js optimisation so function names survive in stack
          # traces). Output is ~3x larger than --release; we accept that
          # for /app-dev/ to keep crash reports debuggable.
          # `flutter build web` always writes to build/web, overwriting the
          # release output — that's fine because we already copied the
          # release bundle into _site/app/ above.
          dart_defines="--dart-define=PRO_FEATURES=true"
          if [ -n "$PVGIS_PROXY" ]; then
            dart_defines="$dart_defines --dart-define=PVGIS_PROXY=$PVGIS_PROXY"
          fi
          flutter build web --profile --source-maps -O 1 \
            --base-href "/${{ github.event.repository.name }}/app-dev/" \
            $dart_defines

      - name: Stage Flutter debug app at /app-dev/
        run: |
          mkdir -p _site/app-dev
          cp -r pv_calculator_dexus_overlay/app/flutter_app/build/web/. _site/app-dev/

      - uses: actions/configure-pages@983d7736d9b0ae728b81ab479565c72886d7745b # v5

      - uses: actions/upload-pages-artifact@56afc609e74202658d3ffba0e8f6dda462b719fa # v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4

  cleanup:
    needs: deploy
    if: always() && needs.deploy.result == 'success'
    runs-on: ubuntu-latest
    permissions:
      actions: write
    steps:
      - name: Delete all artifacts uploaded by this run
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7
        with:
          script: |
            const artifacts = await github.paginate(
              github.rest.actions.listWorkflowRunArtifacts,
              {
                owner: context.repo.owner,
                repo: context.repo.repo,
                run_id: context.runId,
                per_page: 100,
              }
            );
            for (const artifact of artifacts) {
              await github.rest.actions.deleteArtifact({
                owner: context.repo.owner,
                repo: context.repo.repo,
                artifact_id: artifact.id,
              });
              core.info(`Deleted artifact ${artifact.name} (#${artifact.id})`);
            }
