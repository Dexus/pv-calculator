name: Deploy GitHub Pages

# Triggers:
#   - push to main when HTML prototype, Flutter app, engine, or this workflow change
#   - workflow_dispatch (manual trigger from the Actions tab)
#
# Every deploy ships BOTH the HTML prototype at the site root and the Flutter
# web app under /app/. GitHub Pages serves only the most recently uploaded
# artifact, so a partial deploy would wipe the sibling path; keeping them
# bundled guarantees the site is always whole.

on:
  push:
    branches: [main]
    paths:
      - 'pv_calculator_pvgis_clientv4pgis.html'
      - 'pv_calculator_dexus_overlay/app/flutter_app/**'
      - 'pv_calculator_dexus_overlay/packages/pv_engine/**'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Stage HTML prototype at site root
        run: |
          mkdir -p _site
          cp pv_calculator_pvgis_clientv4pgis.html _site/index.html

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Flutter pub get
        working-directory: pv_calculator_dexus_overlay/app/flutter_app
        run: flutter pub get

      - name: Flutter build web
        working-directory: pv_calculator_dexus_overlay/app/flutter_app
        run: flutter build web --release --base-href "/${{ github.event.repository.name }}/app/"

      - name: Stage Flutter app at /app/
        run: |
          mkdir -p _site/app
          cp -r pv_calculator_dexus_overlay/app/flutter_app/build/web/. _site/app/

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4

  cleanup:
    needs: deploy
    if: always() && needs.deploy.result == 'success'
    runs-on: ubuntu-latest
    permissions:
      actions: write
    steps:
      - name: Delete all artifacts uploaded by this run
        uses: actions/github-script@v7
        with:
          script: |
            const artifacts = await github.paginate(
              github.rest.actions.listWorkflowRunArtifacts,
              {
                owner: context.repo.owner,
                repo: context.repo.repo,
                run_id: context.runId,
                per_page: 100,
              }
            );
            for (const artifact of artifacts) {
              await github.rest.actions.deleteArtifact({
                owner: context.repo.owner,
                repo: context.repo.repo,
                artifact_id: artifact.id,
              });
              core.info(`Deleted artifact ${artifact.name} (#${artifact.id})`);
            }
