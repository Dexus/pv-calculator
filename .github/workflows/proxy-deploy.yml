name: Deploy PVGIS proxy

# Manual fallback only. Day-to-day deploys go through Cloudflare's own
# GitHub integration (Workers dashboard → connect repo), which pulls the
# branch and runs `wrangler deploy` itself. Leaving this workflow on a
# `push` trigger would double-deploy and race the Cloudflare-side build.
#
# Run from the Actions tab when the Cloudflare integration is paused
# (e.g. during a rollback or a token rotation). Requires repo secrets
# CLOUDFLARE_API_TOKEN + CLOUDFLARE_ACCOUNT_ID configured out-of-band.

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: proxy-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4
        with:
          node-version: '20'
      - name: Install dependencies
        working-directory: pv_calculator_dexus_overlay/cloudflare-pvgis-proxy
        run: npm ci
      - name: Test
        working-directory: pv_calculator_dexus_overlay/cloudflare-pvgis-proxy
        run: npm test
      - name: Deploy
        working-directory: pv_calculator_dexus_overlay/cloudflare-pvgis-proxy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx wrangler deploy
