name: Deploy PVGIS proxy

# Pushes the Cloudflare Worker in pv_calculator_dexus_overlay/cloudflare-pvgis-proxy/
# whenever main is touched in a way that affects it. Manual run available too.
#
# Requires two repo secrets to be configured out-of-band (never committed):
#   CLOUDFLARE_API_TOKEN  — scoped to "Edit Workers" + "Edit R2"
#   CLOUDFLARE_ACCOUNT_ID — the account that owns the pvgis-cache R2 bucket

on:
  push:
    branches: [main]
    paths:
      - 'pv_calculator_dexus_overlay/cloudflare-pvgis-proxy/**'
      - '.github/workflows/proxy-deploy.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: proxy-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4
        with:
          node-version: '20'
      - name: Install dependencies
        working-directory: pv_calculator_dexus_overlay/cloudflare-pvgis-proxy
        run: npm ci
      - name: Test
        working-directory: pv_calculator_dexus_overlay/cloudflare-pvgis-proxy
        run: npm test
      - name: Deploy
        working-directory: pv_calculator_dexus_overlay/cloudflare-pvgis-proxy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx wrangler deploy
