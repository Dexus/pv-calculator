name: CI

# Third-party actions are pinned to full commit SHAs (tag in trailing comment)
# per GitHub's supply-chain guidance. Update SHA and comment together on bump.

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  pv-engine:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: dart-lang/setup-dart@65eb853c7ba17dde3be364c3d2858773e7144260 # v1
      - name: Install dependencies
        working-directory: pv_calculator_dexus_overlay/packages/pv_engine
        run: dart pub get
      - name: Analyze
        working-directory: pv_calculator_dexus_overlay/packages/pv_engine
        run: dart analyze
      - name: Test
        working-directory: pv_calculator_dexus_overlay/packages/pv_engine
        run: dart test

  component-catalog:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: dart-lang/setup-dart@65eb853c7ba17dde3be364c3d2858773e7144260 # v1
      - name: Install dependencies
        working-directory: pv_calculator_dexus_overlay/packages/component_catalog
        run: dart pub get
      - name: Analyze
        working-directory: pv_calculator_dexus_overlay/packages/component_catalog
        run: dart analyze
      - name: Test
        working-directory: pv_calculator_dexus_overlay/packages/component_catalog
        run: dart test

  flutter-app:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2 # v2
        with:
          channel: stable
      - name: Install dependencies
        working-directory: pv_calculator_dexus_overlay/app/flutter_app
        run: flutter pub get
      - name: Verify pubspec.lock is committed
        # Catches the "I bumped a dep but forgot to commit the lockfile"
        # class of drift before it reaches reviewers.
        working-directory: pv_calculator_dexus_overlay/app/flutter_app
        run: git diff --exit-code pubspec.lock
      - name: Analyze
        working-directory: pv_calculator_dexus_overlay/app/flutter_app
        run: flutter analyze
      - name: Test (free build)
        working-directory: pv_calculator_dexus_overlay/app/flutter_app
        run: flutter test
      - name: Test (Pro build)
        # Mirrors the Pages workflow's --dart-define=PRO_FEATURES=true so
        # Pro-only UI (cyclic SOC convergence) is exercised in CI.
        working-directory: pv_calculator_dexus_overlay/app/flutter_app
        run: flutter test --dart-define=PRO_FEATURES=true

  pvgis-proxy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4
        with:
          node-version: '20'
      - name: Install dependencies
        working-directory: pv_calculator_dexus_overlay/cloudflare-pvgis-proxy
        run: npm ci
      - name: Typecheck
        working-directory: pv_calculator_dexus_overlay/cloudflare-pvgis-proxy
        run: npm run typecheck
      - name: Test
        working-directory: pv_calculator_dexus_overlay/cloudflare-pvgis-proxy
        run: npm test
